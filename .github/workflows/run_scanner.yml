name: Run Endpoint Scanner

on:
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests

      - name: Run Scanner
        run: python endpoint_scanner.py

      - name: Commit and Push working links
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add working_links.json
          git commit -m "Automated update of working links [skip ci]" || echo "No changes to commit"
          git push
