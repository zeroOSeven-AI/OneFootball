name: Matchday generator

on:
  schedule:
    # Pokreće se svaka 2 sata (Automatski mod)
    - cron: '0 */2 * * *'
  workflow_dispatch:
    # Omogućuje ti gumb "Run workflow" u GitHub Actions tabu (Ručni mod)

permissions:
  contents: write

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Preuzmi kod iz repozitorija
      uses: actions/checkout@v4

    - name: Postavi Python okruženje
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instaliraj potrebne pakete
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Pokreni bager za sakupljanje Matchday ID-ova
      run: python generate_matchdays.py

    - name: Spremi izmjene i gurni ih natrag na GitHub
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add matchdays.json
        
        # Provjera ima li uopće novih promjena da skripta ne baci grešku bezveze
        if git diff --staged --quiet; then
          echo "Nema promjena u bazi kola. Preskačem commit."
        else
          git commit -m "🤖 Automatski ažurirana baza kola (matchdays.json)"
          git push
        fi
