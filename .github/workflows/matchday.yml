name: Matchday Generator

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  calculate-matchdays:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests

    - name: Debug repository structure
      run: |
        echo "======================"
        echo "CURRENT DIRECTORY"
        echo "======================"
        pwd

        echo ""
        echo "======================"
        echo "ROOT FILES"
        echo "======================"
        ls -la

        echo ""
        echo "======================"
        echo "ALL FILES IN REPO"
        echo "======================"
        find . -type f

        echo ""
        echo "======================"
        echo "ALL DIRECTORIES"
        echo "======================"
        find . -type d

    - name: Run generator
      run: python generate_matchdays.py

    - name: Ensure matchdays.json exists
      run: |
        if [ ! -f matchdays.json ]; then
          echo "{}" > matchdays.json
          echo "Created empty matchdays.json"
        fi

    - name: Commit changes safely
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"

        git add -A

        if git diff --staged --quiet; then
          echo "No changes detected"
          exit 0
        fi

        git commit -m "🤖 Auto update matchdays"
        git push
